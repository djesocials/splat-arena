<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPLAT ARENA</title>
    <script>
        // Web Audio API context
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Sounds
        const sounds = {
            shoot: new Audio('sounds/shoot.mp3'),
            hit: new Audio('sounds/hit.mp3'),
            shieldImpact: new Audio('sounds/shieldImpact.mp3'),
            powerup: new Audio('sounds/powerup.mp3'),
            victory: new Audio('sounds/victory.mp3'),
            death: new Audio('sounds/death.mp3'),
            uiClick: new Audio('sounds/uiClick.mp3')
        };

        // Function to play sound
        function playSound(action) {
            if (sounds[action]) {
                sounds[action].currentTime = 0; // Reset sound to the start
                sounds[action].play();
            }
        }

        // Example usage
        document.querySelector('#shootButton').addEventListener('click', function() {
            playSound('shoot');
        });
    </script>
</head>
<body>
    <h1>Welcome to SPLAT ARENA</h1>
    <button id="shootButton">Shoot</button>
    <!-- Add other UI elements and game controls -->
</body>
</html>
