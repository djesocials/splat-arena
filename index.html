<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💥 SPLAT ARENA</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#04040f;font-family:'Boogaloo',cursive;}
canvas{position:absolute;top:0;left:0;display:block;touch-action:none;cursor:crosshair;}
canvas.hidden{display:none!important;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px;gap:14px;z-index:20;}
.screen.hidden{display:none!important;}
.bg-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:orbFloat linear infinite;}
@keyframes orbFloat{0%{transform:translateY(0)scale(1);}50%{transform:translateY(-40px)scale(1.1);}100%{transform:translateY(0)scale(1);}}
.logo-main{font-size:clamp(58px,14vw,110px);line-height:.9;text-align:center;
  background:linear-gradient(135deg,#FF3CA0 0%,#FF9D00 50%,#00EEFF 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(255,60,160,.4));}
.logo-sub{font-size:clamp(11px,2vw,15px);letter-spacing:8px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-top:4px;text-align:center;}
input[type=text]{padding:12px 20px;font-family:'Boogaloo',cursive;font-size:clamp(18px,3.5vw,22px);
  background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:14px;
  color:#fff;text-align:center;outline:none;width:100%;max-width:300px;transition:border-color .2s;}
input[type=text]:focus{border-color:rgba(255,60,160,.7);}
input[type=text]::placeholder{color:rgba(255,255,255,.2);}
.btn{padding:14px 40px;font-family:'Boogaloo',cursive;font-size:clamp(18px,3.5vw,24px);
  border:none;border-radius:16px;cursor:pointer;letter-spacing:1px;min-width:220px;
  position:relative;overflow:hidden;transition:transform .08s,box-shadow .1s;touch-action:manipulation;}
.btn:active{transform:scale(.95);}
.btn-hot{background:linear-gradient(135deg,#FF3CA0,#FF6B00);color:#fff;
  box-shadow:0 6px 0 #7a1020,0 0 40px rgba(255,60,160,.25);}
.btn-cool{background:linear-gradient(135deg,#00EEFF,#0088FF);color:#04040f;
  box-shadow:0 6px 0 #004466,0 0 40px rgba(0,200,255,.2);}
.btn-ghost{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);
  border:2px solid rgba(255,255,255,.12);box-shadow:none;}
.code-box{font-size:clamp(40px,11vw,72px);letter-spacing:12px;color:#fff;padding:12px 28px;
  cursor:pointer;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);
  border-radius:16px;text-shadow:0 0 30px rgba(255,60,160,.8),0 0 60px rgba(255,60,160,.3);}
.pslots{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.pslot{width:88px;height:88px;border-radius:18px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;border:2px dashed rgba(255,255,255,.1);
  color:rgba(255,255,255,.2);font-size:12px;transition:all .3s;}
.pslot.on{border-style:solid;}
#hud{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;
  justify-content:space-between;align-items:flex-start;padding:10px 14px;pointer-events:none;}
#hud.hidden{display:none;}
.hscores{display:flex;gap:7px;flex-wrap:wrap;}
.hs{display:flex;align-items:center;gap:6px;background:rgba(4,4,15,.75);
  backdrop-filter:blur(8px);padding:6px 12px 6px 8px;border-radius:12px;
  border-left:4px solid transparent;font-size:clamp(11px,2vw,14px);}
#timer{font-size:clamp(28px,5.5vw,44px);text-shadow:0 0 20px rgba(255,255,255,.3);letter-spacing:2px;}
#timer.warn{color:#FF3CA0;text-shadow:0 0 20px rgba(255,60,160,.7);}
#fire-btn{position:absolute;bottom:22px;right:22px;width:76px;height:76px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#ff6060,#c01830);
  border:3px solid rgba(255,255,255,.25);display:none;align-items:center;
  justify-content:center;font-size:28px;z-index:15;
  box-shadow:0 0 30px rgba(255,40,80,.5);pointer-events:all;touch-action:manipulation;cursor:pointer;}
#minimap-c{position:absolute;bottom:14px;left:14px;width:110px;height:74px;
  border-radius:10px;border:1px solid rgba(255,255,255,.1);
  background:rgba(4,4,20,.8);backdrop-filter:blur(6px);z-index:10;}
#minimap-c.hidden{display:none;}
.toast{position:absolute;top:18px;left:50%;transform:translateX(-50%);
  background:rgba(4,4,15,.9);backdrop-filter:blur(10px);padding:8px 20px;
  border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;
  pointer-events:none;z-index:50;white-space:nowrap;border:1px solid rgba(255,255,255,.1);}
.toast.show{opacity:1;}
#screen-go{background:radial-gradient(ellipse at center,rgba(4,4,15,.96),rgba(0,0,5,.99));z-index:25;}
#go-winner{font-size:clamp(34px,8.5vw,68px);margin:4px 0;}
#go-scores{display:flex;flex-direction:column;gap:5px;align-items:center;}
.go-row{display:flex;align-items:center;gap:10px;font-size:clamp(15px,3.5vw,20px);}
.go-dot{width:16px;height:16px;border-radius:50%;}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="orb" style="width:600px;height:600px;background:#FF3CA0;opacity:.06;top:-200px;left:-150px;animation-duration:12s;"></div>
  <div class="orb" style="width:500px;height:500px;background:#00EEFF;opacity:.06;bottom:-150px;right:-100px;animation-duration:15s;animation-delay:-5s;"></div>
  <div class="orb" style="width:400px;height:400px;background:#7BFF35;opacity:.04;top:30%;right:20%;animation-duration:10s;animation-delay:-3s;"></div>
</div>

<div class="toast" id="toast"></div>

<div class="screen" id="screen-home">
  <div class="logo-main">SPLAT<br>ARENA</div>
  <div class="logo-sub">Real-time paint brawl</div>
  <input id="name-in" type="text" placeholder="Your nickname…" maxlength="12" style="margin-top:8px;">
  <button class="btn btn-hot" onclick="hostGame()">🎮 Host Game</button>
  <button class="btn btn-cool" onclick="gotoJoin()">🔗 Join Game</button>
  <div style="font-size:12px;opacity:.22;margin-top:2px;text-align:center;line-height:1.8;">
    Move toward cursor · Click / tap FIRE to shoot
  </div>
</div>

<div class="screen hidden" id="screen-join">
  <div style="font-size:22px;opacity:.65;letter-spacing:3px;">ENTER CODE</div>
  <input id="code-in" type="text" placeholder="ABCDEF" maxlength="6" style="text-transform:uppercase;letter-spacing:8px;font-size:26px;max-width:240px;">
  <button class="btn btn-cool" onclick="joinGame()">Connect →</button>
  <button class="btn btn-ghost" onclick="showScreen('screen-home')">← Back</button>
  <div id="join-msg" style="font-size:13px;opacity:.4;min-height:18px;"></div>
</div>

<div class="screen hidden" id="screen-lobby">
  <div style="font-size:12px;opacity:.35;letter-spacing:5px;text-transform:uppercase;">Room Code</div>
  <div class="code-box" id="codeDisplay" onclick="copyCode()">------</div>
  <div style="font-size:11px;opacity:.28;letter-spacing:2px;text-transform:uppercase;margin-top:-6px;">📋 tap to copy · share with friends</div>
  <div class="pslots" id="pGrid"></div>
  <div id="lobby-msg" style="font-size:15px;opacity:.55;">Waiting for players…</div>
  <button class="btn btn-hot" id="startBtn" onclick="startGame()" style="display:none;">🚀 Start!</button>
  <button class="btn btn-ghost" onclick="leaveGame()">← Leave</button>
</div>

<canvas id="canvas" class="hidden"></canvas>
<div id="hud" class="hidden">
  <div class="hscores" id="hud-scores"></div>
  <div id="timer">2:00</div>
</div>
<canvas id="minimap-c" class="hidden"></canvas>
<div id="fire-btn">🔥</div>

<div class="screen hidden" id="screen-go">
  <div style="font-size:13px;letter-spacing:7px;opacity:.45;">GAME OVER</div>
  <div id="go-winner"></div>
  <div id="go-scores"></div>
  <button class="btn btn-hot" onclick="playAgain()">🔄 Play Again</button>
  <button class="btn btn-ghost" onclick="leaveGame()">🏠 Home</button>
</div>

<script>
'use strict';

/* ── CONSTANTS ─────────────────────────────── */
const WW=2400, WH=1600;
const PRAD=26, BRAD=7, BBRAD=16;
const PSPD=148;
const GDUR=120, SHOOT_CD=290, PU_INTERVAL=6500;
const TRAIL_MAX=30;
const COLORS=['#FF3CA0','#00EEFF','#7BFF35','#FF9D00'];
const GLOWS=['rgba(255,60,160,.55)','rgba(0,238,255,.55)','rgba(123,255,53,.55)','rgba(255,157,0,.55)'];
const PU_TYPES=['speed','big','shield','chaos','heal'];
const PU_CLR={speed:'#FFEE00',big:'#FF6B00',shield:'#00FFCC',chaos:'#CC00FF',heal:'#FF4466'};
const PU_ICO={speed:'⚡',big:'💥',shield:'🛡',chaos:'🌀',heal:'❤️'};

/* ── STATE ────────────────────────────────── */
let peer=null, myId=0, isHost=false;
let conns=[], connMap={};
let gs=null;
let splats=[], parts=[], trails={};
let bId=0, pId=0, hostLoop=null, rafId=null, lastTick=0, puTimer=0;
let myName='PLAYER', isMobile=false;
let camX=0, camY=0, shakePow=0, shakeX=0, shakeY=0;
let mouseX=0, mouseY=0;
let shootHeld=false, fireTouchDown=false;
const inp={angle:0,shoot:false};

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const mm=document.getElementById('minimap-c');
const mmc=mm.getContext('2d');

/* ── UTILS ────────────────────────────────── */
function showScreen(id){['screen-home','screen-join','screen-lobby','screen-go'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));}
function toast(msg,ms=2400){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),ms);}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.random()*c.length|0]).join('');}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function dst2(a,b){return (a.x-b.x)**2+(a.y-b.y)**2;}
function copyCode(){const t=document.getElementById('codeDisplay').textContent;navigator.clipboard&&navigator.clipboard.writeText(t).then(()=>toast('📋 Copied!'));}

/* ── PEER ─────────────────────────────────── */
function mkPeer(id){return new Promise((res,rej)=>{const p=id?new Peer(id):new Peer();p.on('open',id=>{peer=p;res(id);});p.on('error',e=>rej(e));});}

/* ── HOST ─────────────────────────────────── */
async function hostGame(){
  myName=(document.getElementById('name-in').value.trim().toUpperCase()||'PLAYER').slice(0,12);
  const code=genCode(); toast('Creating room…',4000);
  try{await mkPeer('SA-'+code);}catch(e){toast('Failed — try again');return;}
  isHost=true; myId=0; conns=[]; connMap={};
  gs=mkState(); gs.players[0]=mkPlayer(0,myName); gs.phase='lobby'; gs.code=code;
  peer.on('connection',conn=>{conn.on('open',()=>{
    const pid=gs.players.findIndex(p=>!p);
    if(pid<0||gs.phase!=='lobby'){conn.send({t:'rej',r:gs.phase!=='lobby'?'Match in progress':'Room full'});conn.close();return;}
    conns.push(conn); connMap[conn.peer]=pid;
    conn.on('data',d=>onClientData(conn,d)); conn.on('close',()=>onDC(conn)); conn.on('error',()=>onDC(conn));
    conn.send({t:'assign',id:pid});
  });});
  document.getElementById('codeDisplay').textContent=code;
  updateLobby(); showScreen('screen-lobby'); toast('Room ready! Share the code 🎉');
}
function onClientData(conn,d){
  const pid=connMap[conn.peer]; if(pid==null)return;
  if(d.t==='join'){gs.players[pid]=mkPlayer(pid,(d.name||'PLAYER').toUpperCase().slice(0,12));updateLobby();bcast();}
  else if(d.t==='inp'&&gs.phase==='playing'){applyInp(pid,d.i);}
  else if(d.t==='restart'&&isHost){startGame();}
}
function onDC(conn){
  const pid=connMap[conn.peer]; if(pid==null)return;
  if(gs&&gs.players[pid])gs.players[pid]=null;
  delete connMap[conn.peer]; conns=conns.filter(c=>c!==conn);
  updateLobby(); bcast();
}
function bcast(){const m={t:'gs',gs,splats:splats.slice(-200)};conns.forEach(c=>{try{c.send(m);}catch(e){}});}

/* ── CLIENT ───────────────────────────────── */
function gotoJoin(){myName=(document.getElementById('name-in').value.trim().toUpperCase()||'PLAYER').slice(0,12);showScreen('screen-join');setTimeout(()=>document.getElementById('code-in').focus(),100);}
async function joinGame(){
  const code=document.getElementById('code-in').value.trim().toUpperCase();
  if(code.length<4){toast('Enter a valid code!');return;}
  const msg=document.getElementById('join-msg'); msg.textContent='Connecting…';
  try{await mkPeer(null);}catch(e){msg.textContent='Failed';return;}
  isHost=false;
  const conn=peer.connect('SA-'+code,{reliable:true});
  conn.on('open',()=>{conn.send({t:'join',name:myName});conns=[conn];conn.on('data',d=>onHostData(d));conn.on('close',()=>{toast('Disconnected',3000);leaveGame();});conn.on('error',()=>{toast('Error',3000);leaveGame();});msg.textContent='Connected!';});
  conn.on('error',()=>{msg.textContent='Could not connect — check the code';if(peer){peer.destroy();peer=null;}});
}
function onHostData(d){
  if(d.t==='rej'){toast('Cannot join: '+d.r,3000);leaveGame();return;}
  if(d.t==='assign'){myId=d.id;}
  if(d.t==='gs'){
    const was=gs&&gs.phase==='playing'; gs=d.gs; if(d.splats)splats=d.splats;
    if(gs.phase==='lobby'){document.getElementById('codeDisplay').textContent=gs.code||'------';updateLobby();showScreen('screen-lobby');}
    else if(gs.phase==='playing'&&!was){launchGame();}
    else if(gs.phase==='gameover'){showGO();}
  }
}

/* ── LOBBY ────────────────────────────────── */
function updateLobby(){
  const g=document.getElementById('pGrid'); g.innerHTML='';
  for(let i=0;i<4;i++){
    const p=gs.players[i]; const el=document.createElement('div');
    el.className='pslot'+(p?' on':'');
    if(p){el.style.cssText=`background:${COLORS[i]}18;border-color:${COLORS[i]};color:${COLORS[i]};box-shadow:0 0 14px ${COLORS[i]}44;`;el.innerHTML=`<div style="font-size:24px">●</div><div style="font-size:11px;font-weight:700">${p.name}</div>`;}
    else el.innerHTML=`<div style="font-size:22px;opacity:.2">○</div><div>Empty</div>`;
    g.appendChild(el);
  }
  const n=gs.players.filter(Boolean).length;
  document.getElementById('lobby-msg').textContent=isHost?(n>1?`${n} players ready!`:'Waiting for friends…'):`${n} player${n!==1?'s':''} in lobby`;
  document.getElementById('startBtn').style.display=isHost&&n>=1?'block':'none';
}

/* ── GAME STATE ───────────────────────────── */
function mkState(){return {players:[null,null,null,null],bullets:[],powerups:[],phase:'lobby',timeLeft:GDUR,winner:null,code:''};}
function mkPlayer(id,name){
  const sp=[{x:280,y:280},{x:WW-280,y:WH-280},{x:WW-280,y:280},{x:280,y:WH-280}];
  return {id,name,x:sp[id].x,y:sp[id].y,vx:0,vy:0,angle:0,score:0,alive:true,rTimer:0,sCD:0,shield:0,speed:0,bigShot:0,chaos:0,w:Math.random()*6.28};
}

/* ── START ────────────────────────────────── */
function startGame(){
  if(!isHost)return;
  const old=gs.players.map(p=>p?mkPlayer(p.id,p.name):null);
  gs=mkState(); gs.players=old; gs.phase='playing'; gs.timeLeft=GDUR;
  gs.code=document.getElementById('codeDisplay').textContent;
  splats=[]; parts=[]; trails={}; bId=0; pId=0; puTimer=0;
  bcast(); launchGame();
}
function launchGame(){
  showScreen('_none');
  canvas.classList.remove('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('minimap-c').classList.remove('hidden');
  if(isMobile)document.getElementById('fire-btn').style.display='flex';
  resizeCanvas();
  const me=gs.players[myId]; if(me){camX=me.x-canvas.width/2;camY=me.y-canvas.height/2;}
  if(isHost){if(hostLoop)clearInterval(hostLoop);lastTick=Date.now();hostLoop=setInterval(tick,1000/60);}
  if(rafId)cancelAnimationFrame(rafId);
  let last=performance.now();
  (function loop(now){
    rafId=requestAnimationFrame(loop);
    const dt=Math.min((now-last)/1000,.05); last=now;
    updateCamera(dt); updateShake(dt); updateParts(dt); updateTrails();
    const me2=gs&&gs.players[myId];
    if(me2&&gs.phase==='playing'){
      const wx=camX+mouseX, wy=camY+mouseY;
      inp.angle=Math.atan2(wy-me2.y,wx-me2.x);
      inp.shoot=shootHeld||fireTouchDown;
      if(!isHost&&conns[0])conns[0].send({t:'inp',i:{angle:inp.angle,shoot:inp.shoot}});
    }
    if(isHost&&me2&&gs.phase==='playing')applyInp(0,inp);
    render(); updateHUD(); renderMinimap();
  })(performance.now());
}

/* ── TICK ─────────────────────────────────── */
function tick(){
  if(!gs||gs.phase!=='playing')return;
  const now=Date.now(), dt=Math.min((now-lastTick)/1000,.05); lastTick=now;
  stepPlayers(dt); stepBullets(dt); stepPowerups(dt);
  gs.timeLeft-=dt; puTimer+=dt*1000;
  if(puTimer>PU_INTERVAL){puTimer=0;spawnPU();}
  if(gs.timeLeft<=0){gs.timeLeft=0;endGame();return;}
  bcast();
}
function applyInp(pid,i){
  const p=gs.players[pid]; if(!p||!p.alive)return;
  const ch=p.chaos>0?-1:1;
  const spd=PSPD*(1+(p.speed>0?.65:0))*ch;
  p.vx=lerp(p.vx,Math.cos(i.angle)*spd,.15);
  p.vy=lerp(p.vy,Math.sin(i.angle)*spd,.15);
  p.angle=i.angle;
  if(i.shoot&&p.sCD<=0){fireBullet(pid,p);p.sCD=SHOOT_CD;}
}
function stepPlayers(dt){
  gs.players.forEach(p=>{
    if(!p)return;
    if(!p.alive){p.rTimer-=dt;if(p.rTimer<=0){const sp=[{x:280,y:280},{x:WW-280,y:WH-280},{x:WW-280,y:280},{x:280,y:WH-280}];p.x=sp[p.id].x+(Math.random()-.5)*140;p.y=sp[p.id].y+(Math.random()-.5)*140;p.vx=p.vy=0;p.alive=true;p.shield=2200;}return;}
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<PRAD){p.x=PRAD;p.vx*=-.3;} if(p.x>WW-PRAD){p.x=WW-PRAD;p.vx*=-.3;}
    if(p.y<PRAD){p.y=PRAD;p.vy*=-.3;} if(p.y>WH-PRAD){p.y=WH-PRAD;p.vy*=-.3;}
    const ms=dt*1000;
    if(p.sCD>0)p.sCD-=ms; if(p.shield>0)p.shield-=ms;
    if(p.speed>0)p.speed-=ms; if(p.bigShot>0)p.bigShot-=ms; if(p.chaos>0)p.chaos-=ms;
    p.w+=dt*3;
  });
}
function fireBullet(pid,p){
  const big=p.bigShot>0;
  gs.bullets.push({id:bId++,x:p.x+Math.cos(p.angle)*(PRAD+10),y:p.y+Math.sin(p.angle)*(PRAD+10),
    vx:Math.cos(p.angle)*(big?360:490),vy:Math.sin(p.angle)*(big?360:490),pid,big,life:big?2.8:2.2});
}
function stepBullets(dt){
  gs.bullets=gs.bullets.filter(b=>{
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    const r=b.big?BBRAD:BRAD;
    if(b.life<=0||b.x<r||b.x>WW-r||b.y<r||b.y>WH-r){addSplat(b.x,b.y,COLORS[b.pid],b.big);boom(b.x,b.y,COLORS[b.pid],b.big?14:7);return false;}
    for(const p of gs.players){
      if(!p||!p.alive||p.id===b.pid)continue;
      if(dst2(b,p)<(PRAD+r)**2){
        addSplat(p.x,p.y,COLORS[b.pid],b.big);boom(p.x,p.y,COLORS[b.pid],b.big?24:12);
        if(p.shield<=0){p.alive=false;p.rTimer=3;p.vx=p.vy=0;const s=gs.players[b.pid];if(s)s.score++;}
        else{p.shield=0;boom(p.x,p.y,'#00FFCC',8);}
        return false;
      }
    }
    return true;
  });
}
function spawnPU(){gs.powerups.push({id:pId++,x:120+Math.random()*(WW-240),y:120+Math.random()*(WH-240),type:PU_TYPES[Math.random()*PU_TYPES.length|0],life:15});}
function stepPowerups(dt){
  gs.powerups=gs.powerups.filter(u=>{
    u.life-=dt; if(u.life<=0)return false;
    for(const p of gs.players){if(!p||!p.alive)continue;if(dst2(p,u)<(PRAD+22)**2){applyPU(p,u.type);boom(u.x,u.y,PU_CLR[u.type],18);return false;}}
    return true;
  });
}
function applyPU(p,t){
  if(t==='speed')p.speed=5000; else if(t==='big')p.bigShot=6000;
  else if(t==='shield')p.shield=9000; else if(t==='chaos')gs.players.forEach(o=>{if(o&&o.id!==p.id)o.chaos=3500;});
  else if(t==='heal')p.shield=5000;
}
function addSplat(x,y,color,big=false){
  splats.push({x,y,color,r:big?42:22,a:Math.random()*6.28,pts:6+Math.random()*5|0});
  if(splats.length>320)splats.shift();
}
function boom(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28,spd=70+Math.random()*300;
    parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,color,life:.5+Math.random()*.5,max:.7+Math.random()*.4,r:3+Math.random()*7,rot:Math.random()*6.28});
  }
}

/* ── GAME OVER ────────────────────────────── */
function endGame(){
  if(!isHost)return; clearInterval(hostLoop);hostLoop=null;
  const alive=gs.players.filter(Boolean);
  const win=alive.reduce((b,p)=>(!b||p.score>b.score)?p:b,null);
  gs.winner=win?win.id:null; gs.phase='gameover'; bcast(); showGO();
}
function showGO(){
  canvas.classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('minimap-c').classList.add('hidden');
  document.getElementById('fire-btn').style.display='none';
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(hostLoop){clearInterval(hostLoop);hostLoop=null;}
  const win=gs.winner!=null?gs.players[gs.winner]:null;
  const el=document.getElementById('go-winner');
  el.textContent=win?`🎉 ${win.name} WINS!`:'🎨 TIE!';
  el.style.cssText=`color:${win?COLORS[win.id]:'#fff'};text-shadow:0 0 40px ${win?COLORS[win.id]:'#fff'};`;
  document.getElementById('go-scores').innerHTML=gs.players.filter(Boolean).sort((a,b)=>b.score-a.score)
    .map(p=>`<div class="go-row"><div class="go-dot" style="background:${COLORS[p.id]};box-shadow:0 0 10px ${COLORS[p.id]}"></div><span style="color:${COLORS[p.id]}">${p.name}</span><span style="opacity:.6;font-family:'Nunito',sans-serif;font-weight:700">${p.score} splats</span></div>`).join('');
  document.getElementById('screen-go').classList.remove('hidden');
}
function playAgain(){if(isHost)startGame();else{conns[0]&&conns[0].send({t:'restart'});toast('Waiting for host…',2500);}}
function leaveGame(){
  clearInterval(hostLoop); if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(peer){peer.destroy();peer=null;}
  conns=[];connMap={};gs=null;isHost=false;myId=0;splats=[];parts=[];trails={};
  canvas.classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('minimap-c').classList.add('hidden');
  document.getElementById('fire-btn').style.display='none';
  showScreen('screen-home');
}

/* ── CLIENT VISUALS ───────────────────────── */
function updateCamera(dt){
  const me=gs&&gs.players[myId]; if(!me)return;
  camX=lerp(camX,me.x-canvas.width/2,.09); camY=lerp(camY,me.y-canvas.height/2,.09);
  camX=clamp(camX,0,Math.max(0,WW-canvas.width)); camY=clamp(camY,0,Math.max(0,WH-canvas.height));
}
function updateShake(dt){
  if(shakePow>0){shakeX=(Math.random()-.5)*shakePow*2;shakeY=(Math.random()-.5)*shakePow*2;shakePow=Math.max(0,shakePow-dt*50);}
  else{shakeX=0;shakeY=0;}
}
function updateParts(dt){
  parts=parts.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=280*dt;p.vx*=.97;p.rot+=dt*4;p.life-=dt;return p.life>0;});
}
function updateTrails(){
  if(!gs)return;
  gs.players.forEach(p=>{
    if(!p||!p.alive)return;
    if(!trails[p.id])trails[p.id]=[];
    trails[p.id].push({x:p.x,y:p.y});
    if(trails[p.id].length>TRAIL_MAX)trails[p.id].shift();
  });
}

/* ── RENDER ───────────────────────────────── */
function resizeCanvas(){
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  mm.width=110;mm.height=74;
}
window.addEventListener('resize',resizeCanvas);

function render(){
  if(!gs)return;
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(Math.round(-camX+shakeX),Math.round(-camY+shakeY));
  drawFloor(); drawSplats(); drawPUs(); drawTrails(); drawBullets(); drawPlayers(); drawParticles(); drawBorder();
  ctx.restore();
  drawVignette(W,H);
  const me=gs.players[myId];
  if(me&&!me.alive){
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
    ctx.font=`bold ${Math.min(W*.044,20)|0}px Boogaloo`;
    ctx.fillStyle='rgba(255,255,255,.92)';ctx.textAlign='center';
    ctx.fillText(`💀 SPLATTED! Respawning in ${Math.ceil(me.rTimer)}s…`,W/2,H/2);
    ctx.textAlign='left';
  }
}

function drawFloor(){
  // Base gradient
  const bg=ctx.createLinearGradient(0,0,WW,WH);
  bg.addColorStop(0,'#07071a');bg.addColorStop(.5,'#0b0b22');bg.addColorStop(1,'#060614');
  ctx.fillStyle=bg;ctx.fillRect(0,0,WW,WH);
  // Hex grid
  const S=68,w=S*Math.sqrt(3),hS=S/2;
  ctx.strokeStyle='rgba(120,120,255,.04)';ctx.lineWidth=1;
  const cols=Math.ceil(WW/w)+3, rows=Math.ceil(WH/S*2/3)+3;
  for(let r=-1;r<rows;r++){for(let c=-1;c<cols;c++){
    const cx=(c+(r%2)*.5)*w, cy=r*(S*1.5);
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;ctx.lineTo(cx+S*Math.cos(a),cy+S*Math.sin(a));}
    ctx.closePath();ctx.stroke();
  }}
  // Subtle radial light from center
  const rg=ctx.createRadialGradient(WW/2,WH/2,0,WW/2,WH/2,Math.hypot(WW,WH)*.65);
  rg.addColorStop(0,'rgba(50,30,110,.2)');rg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=rg;ctx.fillRect(0,0,WW,WH);
}

function drawBorder(){
  ctx.save();
  // Danger stripes at edges
  ctx.strokeStyle='rgba(255,60,160,.6)';ctx.lineWidth=5;ctx.shadowColor='#FF3CA0';ctx.shadowBlur=22;
  ctx.strokeRect(3,3,WW-6,WH-6);
  // Corner brackets
  ctx.lineWidth=9;ctx.strokeStyle='rgba(255,60,160,.85)';
  const C=55;
  [[0,0],[WW,0],[WW,WH],[0,WH]].forEach(([cx,cy])=>{
    const sx=cx===0?1:-1,sy=cy===0?1:-1;
    ctx.beginPath();ctx.moveTo(cx+sx*C,cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+sy*C);ctx.stroke();
  });
  ctx.restore();
}

function drawSplats(){
  ctx.save();
  splats.forEach(sp=>{
    ctx.translate(0,0);ctx.save();ctx.translate(sp.x,sp.y);ctx.rotate(sp.a);
    const n=Math.max(8,(sp.pts*2)|0);
    // Outer
    ctx.globalAlpha=.5;ctx.fillStyle=sp.color;
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2,even=i%2===0;
      const r=even?sp.r:sp.r*(.38+Math.sin(i*5.7+sp.a)*.1+.1);
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();ctx.fill();
    // Inner lighter
    ctx.globalAlpha=.25;ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.beginPath();ctx.ellipse(-sp.r*.22,-sp.r*.2,sp.r*.32,sp.r*.2,-.4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha=1;ctx.restore();
}

function drawTrails(){
  Object.entries(trails).forEach(([id,trail])=>{
    if(!trail||trail.length<2)return;
    const col=COLORS[+id];
    for(let i=1;i<trail.length;i++){
      const t=i/trail.length;
      ctx.save();ctx.globalAlpha=t*.3;ctx.strokeStyle=col;
      ctx.lineWidth=t*PRAD*.65;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(trail[i-1].x,trail[i-1].y);ctx.lineTo(trail[i].x,trail[i].y);
      ctx.stroke();ctx.restore();
    }
  });
}

function drawPlayers(){
  const now=Date.now();
  gs.players.forEach(p=>{
    if(!p||!p.alive)return;
    const col=COLORS[p.id];
    const spd=Math.hypot(p.vx,p.vy);
    const stretch=1+spd/PSPD*.2, squish=1/stretch;
    const blink=p.shield>0&&Math.floor(now/115)%2===0;
    ctx.globalAlpha=blink?.38:1;
    ctx.save();ctx.translate(p.x,p.y);

    // Outer pulse ring
    const ringR=PRAD+7+Math.sin(p.w*.9)*3;
    ctx.save();ctx.globalAlpha*=.4;ctx.strokeStyle=col;ctx.lineWidth=2.5;
    ctx.shadowColor=col;ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(0,0,ringR,0,Math.PI*2);ctx.stroke();ctx.restore();

    // Chaos ring
    if(p.chaos>0){
      ctx.save();ctx.globalAlpha=.55+.45*Math.sin(now*.016);
      ctx.strokeStyle='#CC00FF';ctx.lineWidth=2.5;ctx.shadowColor='#CC00FF';ctx.shadowBlur=14;
      ctx.setLineDash([9,6]);ctx.beginPath();ctx.arc(0,0,PRAD+15,now*.003,now*.003+Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
    }
    // Shield ring
    if(p.shield>0){
      ctx.save();ctx.globalAlpha=.5;ctx.strokeStyle='#00FFCC';ctx.lineWidth=2.5;ctx.shadowColor='#00FFCC';ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(0,0,PRAD+13,now*.0024,now*.0024+Math.PI*2);ctx.stroke();ctx.restore();
    }

    // Speed lines
    if(spd>PSPD*.55){
      ctx.save();ctx.globalAlpha=.25*(spd/PSPD-.4);ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.rotate(p.angle+Math.PI);
      for(let i=-2;i<=2;i++){
        const off=i*7, len=10+Math.random()*14;
        ctx.beginPath();ctx.moveTo(PRAD+5,off);ctx.lineTo(PRAD+5+len,off);ctx.stroke();
      }
      ctx.restore();
    }

    // BODY
    ctx.save();ctx.rotate(p.angle);ctx.scale(stretch,squish);
    ctx.shadowColor=col;ctx.shadowBlur=22;ctx.fillStyle=col;
    ctx.beginPath();
    const segs=20;
    for(let i=0;i<=segs;i++){
      const a=(i/segs)*Math.PI*2;
      const wb=1+Math.sin(p.w*1.3+a*2.5)*.1+Math.sin(p.w*.7+a*4.2)*.05;
      const r=PRAD*wb;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();ctx.fill();
    // Rim
    ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=2;ctx.shadowBlur=0;ctx.stroke();
    // Gloss
    ctx.fillStyle='rgba(255,255,255,.2)';
    ctx.beginPath();ctx.ellipse(-PRAD*.28,-PRAD*.26,PRAD*.4,PRAD*.27,-.4,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // EYES
    ctx.save();ctx.rotate(p.angle);
    const eo=PRAD*.4;
    [[-eo*.58, eo*.54],[eo*.58,eo*.54]].forEach(([ex,ey])=>{
      ctx.fillStyle='rgba(255,255,255,.95)';ctx.beginPath();ctx.ellipse(ex,ey,5,6,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#0a0a20';ctx.beginPath();ctx.arc(ex+1.5,ey+1.5,2.8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(ex+.5,ey-.6,1.1,0,Math.PI*2);ctx.fill();
    });
    // Mouth
    ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=1.5;
    if(spd>PSPD*.55){
      ctx.fillStyle='rgba(255,255,255,.45)';ctx.beginPath();ctx.arc(0,PRAD*.3,4.5,0,Math.PI*2);ctx.fill();
    } else {
      ctx.beginPath();ctx.arc(0,PRAD*.3,4,.1,Math.PI-.1);ctx.stroke();
    }
    ctx.restore();

    // Name + badge
    ctx.font='bold 13px Boogaloo';ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=3;ctx.strokeText(p.name,0,-PRAD-10);
    ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillText(p.name,0,-PRAD-10);
    const fx=(p.speed>0?'⚡':'')+(p.bigShot>0?'💥':'')+(p.chaos>0?'🌀':'')+(p.shield>0?'🛡':'');
    if(fx){ctx.font='11px serif';ctx.fillStyle='white';ctx.fillText(fx,0,-PRAD-25);}

    ctx.restore();ctx.globalAlpha=1;
  });
}

function drawBullets(){
  const now=Date.now();
  gs.bullets.forEach(b=>{
    const col=COLORS[b.pid],r=b.big?BBRAD:BRAD;
    const spd=Math.hypot(b.vx,b.vy);
    ctx.save();
    // Trail
    const tl=r*5, tx=b.x-b.vx/spd*tl, ty=b.y-b.vy/spd*tl;
    const gr=ctx.createLinearGradient(tx,ty,b.x,b.y);
    gr.addColorStop(0,'transparent');gr.addColorStop(1,col);
    ctx.globalAlpha=.45;ctx.strokeStyle=gr;ctx.lineWidth=r*1.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(b.x,b.y);ctx.stroke();
    // Glow core
    ctx.globalAlpha=1;ctx.shadowColor=col;ctx.shadowBlur=b.big?32:16;
    ctx.fillStyle='rgba(255,255,255,.95)';
    ctx.beginPath();ctx.arc(b.x,b.y,r*.5,0,Math.PI*2);ctx.fill();
    const wobbleR=r*(1+Math.sin(now*.02+b.id)*.2);
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(b.x,b.y,wobbleR*.75,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

function drawPUs(){
  const now=Date.now();
  gs.powerups.forEach(u=>{
    const col=PU_CLR[u.type],pulse=1+Math.sin(now*.004+u.id)*.14,r=22*pulse;
    ctx.save();ctx.translate(u.x,u.y);
    ctx.shadowColor=col;ctx.shadowBlur=28;
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.globalAlpha=.7;
    ctx.beginPath();ctx.arc(0,0,r+9,now*.003,now*.003+Math.PI*2);ctx.stroke();
    ctx.globalAlpha=.3;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,0,r+18,-now*.002,-now*.002+Math.PI*2);ctx.stroke();
    ctx.globalAlpha=.22;ctx.fillStyle=col;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    ctx.font=`${(r*1.1)|0}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(PU_ICO[u.type],0,1);ctx.textBaseline='alphabetic';
    ctx.restore();
  });
}

function drawParticles(){
  parts.forEach(p=>{
    const a=p.life/p.max;
    ctx.save();ctx.globalAlpha=a*.88;ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.shadowColor=p.color;ctx.shadowBlur=8;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(0,0,p.r*a,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

function drawVignette(W,H){
  const vg=ctx.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,H*.88);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.6)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

/* ── HUD ──────────────────────────────────── */
function updateHUD(){
  if(!gs||gs.phase!=='playing')return;
  const t=Math.ceil(gs.timeLeft),m=t/60|0,s2=t%60;
  const te=document.getElementById('timer');
  te.textContent=`${m}:${(''+s2).padStart(2,'0')}`;te.className=t<=15?'warn':'';
  document.getElementById('hud-scores').innerHTML=
    gs.players.filter(Boolean).sort((a,b)=>b.score-a.score).map(p=>`
      <div class="hs" style="border-left-color:${COLORS[p.id]}">
        <span style="color:${COLORS[p.id]};font-weight:700">${p.name}</span>
        <span style="font-family:'Nunito',sans-serif;font-weight:700">${p.score}</span>
        <span style="font-size:.8em">${p.shield>0?'🛡':''}${p.speed>0?'⚡':''}${p.bigShot>0?'💥':''}${p.chaos>0?'🌀':''}</span>
      </div>`).join('');
}

function renderMinimap(){
  if(!gs||gs.phase!=='playing')return;
  const W=mm.width,H=mm.height,sx=W/WW,sy=H/WH;
  mmc.clearRect(0,0,W,H);
  mmc.fillStyle='rgba(4,4,20,.9)';mmc.fillRect(0,0,W,H);
  splats.forEach(sp=>{mmc.fillStyle=sp.color;mmc.globalAlpha=.35;mmc.beginPath();mmc.arc(sp.x*sx,sp.y*sy,1.5,0,Math.PI*2);mmc.fill();});
  mmc.globalAlpha=1;
  gs.players.forEach(p=>{
    if(!p||!p.alive)return;
    mmc.shadowColor=COLORS[p.id];mmc.shadowBlur=5;mmc.fillStyle=COLORS[p.id];
    mmc.beginPath();mmc.arc(p.x*sx,p.y*sy,p.id===myId?4:3,0,Math.PI*2);mmc.fill();
    mmc.shadowBlur=0;
  });
  // Viewport rect
  mmc.strokeStyle='rgba(255,255,255,.25)';mmc.lineWidth=1;
  mmc.strokeRect(camX*sx,camY*sy,canvas.width*sx,canvas.height*sy);
}

/* ── INPUT ────────────────────────────────── */
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
canvas.addEventListener('mousedown',e=>{if(e.button===0)shootHeld=true;});
canvas.addEventListener('mouseup',e=>{if(e.button===0)shootHeld=false;});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

isMobile=/Mobi|Android|iPhone|iPad|Touch/i.test(navigator.userAgent)||navigator.maxTouchPoints>1;

const fireBtn=document.getElementById('fire-btn');
fireBtn.addEventListener('touchstart',e=>{e.preventDefault();fireTouchDown=true;},{passive:false});
fireBtn.addEventListener('touchend',e=>{e.preventDefault();fireTouchDown=false;},{passive:false});

let steerTid=null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    if(steerTid===null){steerTid=t.identifier;mouseX=t.clientX;mouseY=t.clientY;}
  });
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{if(t.identifier===steerTid){mouseX=t.clientX;mouseY=t.clientY;}});
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{if(t.identifier===steerTid)steerTid=null;});
},{passive:false});
canvas.addEventListener('touchcancel',e=>{
  Array.from(e.changedTouches).forEach(t=>{if(t.identifier===steerTid)steerTid=null;});
},{passive:false});

/* ── BOOT ─────────────────────────────────── */
resizeCanvas();
showScreen('screen-home');
document.getElementById('name-in').focus();
</script>
