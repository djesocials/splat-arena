    #sound-toggle:hover{opacity:1;background:rgba(255,255,255,.15);}

  <script type="module">
    'use strict';

    const { ref, onValue, set, update, remove, runTransaction, serverTimestamp, db } = window.firebaseAPI;

    // ── CONSTANTS ────────────────────────────────────────────────
    const WW = 2400, WH = 1600;
    const PRAD = 26, BRAD = 7, BBRAD = 16;
    const PSPD = 420;
    const GDUR = 120, SHOOT_CD = 290, PU_INTERVAL = 6500;
    const TRAIL_MAX = 28;
    const COLORS = ['#FF3CA0','#00EEFF','#7BFF35','#FF9D00'];
    const PU_TYPES = ['speed','big','shield','chaos','heal'];
    const PU_CLR  = {speed:'#FFEE00',big:'#FF6B00',shield:'#00FFCC',chaos:'#CC00FF',heal:'#FF4466'};
    const PU_ICO  = {speed:'⚡',big:'💥',shield:'🛡',chaos:'🌀',heal:'❤️'};
    const BOT_NAMES = ['ROBO','GLITCH','AXIOM','NEXUS','DELTA','OMEGA'];

    // ── AUDIO ────────────────────────────────────────────────────
    let AC = null;
    let AC_MUTE = localStorage.getItem('splatMute') === 'true';
    const soundToggle = document.getElementById('sound-toggle');
    soundToggle.textContent = AC_MUTE ? '🔇' : '🔊';

    function initAudio() {
      if (AC) return;
      AC = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(type, pitch = 1) {
      if (AC_MUTE || !AC) return;
      if (AC.state === 'suspended') AC.resume().catch(() => {});
      const now = AC.currentTime;
      const g = AC.createGain(); g.connect(AC.destination);
      const o = AC.createOscillator(); o.connect(g);

      if (type === 'shoot') {
        o.type = 'triangle';
        o.frequency.setValueAtTime(880 * pitch, now);
        o.frequency.exponentialRampToValueAtTime(220, now + 0.08);
        g.gain.setValueAtTime(0.18, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        o.start(now); o.stop(now + 0.12);
      } else if (type === 'bigshot') {
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(300 * pitch, now);
        o.frequency.exponentialRampToValueAtTime(80, now + 0.25);
        g.gain.setValueAtTime(0.22, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        o.start(now); o.stop(now + 0.25);
      } else if (type === 'hit') {
        o.type = 'square';
        o.frequency.setValueAtTime(120 * pitch, now);
        o.frequency.linearRampToValueAtTime(40, now + 0.18);
        g.gain.setValueAtTime(0.14, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
        o.start(now); o.stop(now + 0.18);
      } else if (type === 'splat' || type === 'death') {
        o.type = 'sine';
        o.frequency.setValueAtTime(180 * pitch, now);
        o.frequency.exponentialRampToValueAtTime(60, now + 0.22);
        g.gain.setValueAtTime(0.25, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
        o.start(now); o.stop(now + 0.22);
      } else if (type === 'powerup') {
        o.type = 'sine';
        o.frequency.setValueAtTime(600, now);
        o.frequency.exponentialRampToValueAtTime(1200 * pitch, now + 0.35);
        g.gain.setValueAtTime(0.12, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        o.start(now); o.stop(now + 0.35);
      } else if (type === 'respawn') {
        o.type = 'triangle';
        o.frequency.setValueAtTime(400, now);
        o.frequency.exponentialRampToValueAtTime(900, now + 0.15);
        g.gain.setValueAtTime(0.15, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.start(now); o.stop(now + 0.15);
      }
    }

    function toggleMute() {
      AC_MUTE = !AC_MUTE;
      localStorage.setItem('splatMute', AC_MUTE);
      soundToggle.textContent = AC_MUTE ? '🔇' : '🔊';
    }

    // ── STATE ────────────────────────────────────────────────────
    let myId = null;
    let myName = 'PLAYER';
    let roomCode = null;
    let isHost = false;
    let gs = null;
    let splats = [], parts = [], trails = {};
    let bId = 0, pId = 0, puTimer = 0;
    let bots = [];
    let camX = 0, camY = 0;
    let mouseX = 0, mouseY = 0, shootHeld = false, fireTouchDown = false;
    const inp = {angle:0, shoot:false};
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const mm = document.getElementById('minimap-c');
    const mmc = mm.getContext('2d');

    let lastShotTime = 0;

    // ── UTILS ────────────────────────────────────────────────────
    function showScreen(id){
      initAudio();
      document.querySelectorAll('.screen').forEach(s => s.classList.toggle('hidden', s.id !== id));
    }

    function toast(msg, ms=2400){
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), ms);
    }

    function genCode(){
      const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      return Array.from({length:6}, () => c[Math.random()*c.length|0]).join('');
    }

    function lerp(a,b,t){return a+(b-a)*t;}
    function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
    function dst2(a,b){return (a.x-b.x)**2 + (a.y-b.y)**2;}

    function copyCode(){
      navigator.clipboard.writeText(roomCode).then(()=>toast('📋 Copied!'));
    }

    function isInView(x,y){
      return x > camX-100 && x < camX+canvas.width+100 && y > camY-100 && y < camY+canvas.height+100;
    }

    // ── LOBBY & ROOM ─────────────────────────────────────────────
    function hostGame(){
      myName = (document.getElementById('name-in').value.trim().toUpperCase() || 'PLAYER').slice(0,12);
      roomCode = genCode();
      isHost = true;
      myId = 0;

      const roomRef = ref(db, `rooms/${roomCode}`);
      set(roomRef, {
        hostName: myName,
        phase: 'lobby',
        createdAt: serverTimestamp(),
        players: {
          0: {
            name: myName,
            score: 0,
            x: 280,
            y: 280,
            alive: true,
            shield: 0,
            speed: 0,
            bigShot: 0,
            chaos: 0,
            angle: 0
          }
        }
      }).then(() => {
        document.getElementById('codeDisplay').textContent = roomCode;
        showScreen('screen-lobby');
        toast('Room created! Share the code 🎉');
        listenToRoom();
      }).catch(err => toast('Failed to create room: ' + err.message));
    }

    function joinGame(){
      roomCode = document.getElementById('code-in').value.trim().toUpperCase();
      if (roomCode.length < 4) return toast('Enter a valid code!');

      myName = (document.getElementById('name-in').value.trim().toUpperCase() || 'PLAYER').slice(0,12);

      const roomRef = ref(db, `rooms/${roomCode}`);
      runTransaction(roomRef, (room) => {
        if (!room) return null;
        if (room.phase !== 'lobby') return;
        const playerCount = Object.keys(room.players || {}).length;
        if (playerCount >= 4) return;

        const newId = playerCount;
        room.players = room.players || {};
        room.players[newId] = {
          name: myName,
          score: 0,
          x: 280 + (newId % 2 ? WW - 560 : 0),
          y: 280 + (newId > 1 ? WH - 560 : 0),
          alive: true,
          shield: 0,
          speed: 0,
          bigShot: 0,
          chaos: 0,
          angle: 0
        };
        myId = newId;
        return room;
      }).then((result) => {
        if (result.committed) {
          toast('Joined!');
          listenToRoom();
          showScreen('screen-lobby');
        } else {
          toast(result.snapshot.val() ? 'Game in progress or full' : 'Room not found');
        }
      }).catch(err => toast('Error joining: ' + err.message));
    }

    function listenToRoom(){
      const roomRef = ref(db, `rooms/${roomCode}`);
      onValue(roomRef, (snap) => {
        gs = snap.val();
        if (!gs) {
          toast('Room closed or does not exist');
          leaveGame();
          return;
        }

        if (gs.phase === 'lobby') {
          updateLobbyUI();
        } else if (gs.phase === 'playing' && !rafId) {
          launchGame();
        } else if (gs.phase === 'gameover') {
          showGO();
        }
      }, {onlyOnce: false});
    }

    function updateLobbyUI(){
      const g = document.getElementById('pGrid');
      g.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const p = gs?.players?.[i];
        const el = document.createElement('div');
        el.className = 'pslot' + (p ? ' on' : '');
        if (p) {
          el.style.cssText = `background:${COLORS[i]}15;border-color:${COLORS[i]};color:${COLORS[i]};box-shadow:0 0 12px ${COLORS[i]}44;`;
          el.innerHTML = `<div style="font-size:22px">●</div><div style="font-size:10px;font-weight:700">${p.name}</div>`;
        } else {
          el.innerHTML = `<div style="font-size:22px;opacity:.18">○</div><div>Empty</div>`;
        }
        g.appendChild(el);
      }
      const n = Object.keys(gs?.players || {}).length;
      document.getElementById('lobby-msg').textContent = isHost
        ? (n > 1 ? `${n} players ready!` : 'Waiting for friends…')
        : `${n} player${n !== 1 ? 's' : ''} in lobby`;
      document.getElementById('startBtn').style.display = isHost && n >= 1 ? 'block' : 'none';
    }

    // ── BOT MODE (local only) ────────────────────────────────────
    function goBotMode(){
      myName = (document.getElementById('name-in').value.trim().toUpperCase() || 'PLAYER').slice(0,12);
      showScreen('screen-bots');
    }

    function setBotCount(n){
      botCount = n;
      document.querySelectorAll('#bot-count-row .diff-btn').forEach((b,i)=>b.classList.toggle('sel',i===n-1));
    }

    function setDiff(d){
      botDiff = d;
      document.querySelectorAll('#diff-row .diff-btn').forEach(b=>b.classList.toggle('sel',b.textContent.toLowerCase().includes(d)));
    }

    function startBotGame(){
      isHost = true;
      myId = 0;
      roomCode = 'BOT-' + Math.random().toString(36).slice(2,8).toUpperCase();
      gs = {
        phase: 'playing',
        timeLeft: GDUR,
        players: {0: mkPlayer(0, myName)},
        bullets: [],
        powerups: []
      };
      bots = [];
      for (let i = 0; i < botCount; i++) {
        const id = i + 1;
        gs.players[id] = mkPlayer(id, BOT_NAMES[i % BOT_NAMES.length]);
        bots.push({id, thinkTimer: Math.random()*0.5, targetX: gs.players[id].x, targetY: gs.players[id].y, aimAngle: Math.random()*Math.PI*2, wantShoot: false});
      }
      splats = []; parts = []; trails = {}; bId = 0; pId = 0; puTimer = 0;
      launchGame();
    }

    // ── GAME STATE FACTORY ───────────────────────────────────────
    function mkPlayer(id, name){
      const sp = [{x:280,y:280},{x:WW-280,y:WH-280},{x:WW-280,y:280},{x:280,y:WH-280}];
      return {id, name, x:sp[id].x, y:sp[id].y, vx:0, vy:0, angle:0, score:0,
        alive:true, rTimer:0, sCD:0, shield:0, speed:0, bigShot:0, chaos:0};
    }

    // ── GAME LOOP ────────────────────────────────────────────────
    function launchGame(){
      showScreen('_none');
      canvas.classList.remove('hidden');
      document.getElementById('hud').classList.remove('hidden');
      document.getElementById('minimap-c').classList.remove('hidden');
      if (isMobile) document.getElementById('fire-btn').style.display = 'flex';
      resizeCanvas();

      let lastF = performance.now();
      function loop(now){
        rafId = requestAnimationFrame(loop);
        const dt = Math.min((now - lastF)/1000, 0.05);
        lastF = now;

        if (gs?.phase !== 'playing') return;

        if (isHost) {
          hostTick(dt);
        }

        updateCamera(dt);
        updateParts(dt);
        updateTrails();
        render();
        updateHUD();
        renderMinimap();
      }
      loop(performance.now());
    }

    function hostTick(dt){
      // Apply local input
      applyInput(myId, inp);

      // Bots
      if (botMode) tickBots(dt);

      stepPlayers(dt);
      stepBullets(dt);
      stepPowerups(dt);

      gs.timeLeft -= dt;
      puTimer += dt*1000;
      if (puTimer > PU_INTERVAL) {
        puTimer = 0;
        spawnPU();
      }

      if (gs.timeLeft <= 0) {
        gs.timeLeft = 0;
        gs.phase = 'gameover';
        const alive = Object.values(gs.players).filter(p=>p?.alive);
        const win = alive.reduce((best, p) => (!best || p.score > best.score) ? p : best, null);
        gs.winner = win ? win.id : null;
      }

      // Sync to Firebase (only changed parts if possible – for simplicity full state)
      update(ref(db, `rooms/${roomCode}`), {
        players: gs.players,
        bullets: gs.bullets,
        powerups: gs.powerups,
        timeLeft: gs.timeLeft,
        phase: gs.phase,
        winner: gs.winner
      });
    }

    function applyInput(pid, input){
      const p = gs.players[pid];
      if (!p || !p.alive) return;
      const ch = p.chaos > 0 ? -1 : 1;
      const spd = PSPD * (1 + (p.speed > 0 ? 0.65 : 0)) * ch;
      p.vx = lerp(p.vx, Math.cos(input.angle) * spd, 0.15);
      p.vy = lerp(p.vy, Math.sin(input.angle) * spd, 0.15);
      p.angle = input.angle;
      if (input.shoot && p.sCD <= 0) {
        fireBullet(pid, p);
        p.sCD = SHOOT_CD;
      }
    }

    // ── BOT AI (restored full original orbiting logic) ───────────
    const DIFF = {
      easy:   {speedMult:0.28, thinkSec:2.2, shootRange:220, aimNoise:1.4, shootChance:0.2},
      medium: {speedMult:0.52, thinkSec:0.9, shootRange:420, aimNoise:0.5, shootChance:0.6},
      hard:   {speedMult:0.80, thinkSec:0.3, shootRange:700, aimNoise:0.12, shootChance:0.88},
    };

    function tickBots(dt){
      const D = DIFF[botDiff] || DIFF.medium;
      bots.forEach(bot => {
        const p = gs.players[bot.id];
        if (!p || !p.alive) return;
        bot.thinkTimer = (bot.thinkTimer || 0) - dt;
        if (bot.thinkTimer <= 0) {
          bot.thinkTimer = D.thinkSec * (0.75 + Math.random()*0.5);
          let target = null, bestD = Infinity;
          Object.values(gs.players).forEach(en => {
            if (!en || !en.alive || en.id === bot.id) return;
            const d = dst2(p, en);
            if (d < bestD) { bestD = d; target = en; }
          });
          const inRange = target && bestD < D.shootRange**2;
          if (inRange) {
            const dist = Math.sqrt(bestD);
            const ax = target.x - p.x, ay = target.y - p.y;
            const toA = Math.atan2(ay, ax);
            if (dist < 180) {
              bot.targetX = p.x - ax * 0.8;
              bot.targetY = p.y - ay * 0.8;
            } else {
              const side = (bot.id % 2 === 0 ? 1 : -1) * (Math.random() < 0.1 ? -1 : 1);
              const orbit = toA + Math.PI / 2 * side;
              const optR = 240;
              bot.targetX = target.x + Math.cos(orbit) * optR;
              bot.targetY = target.y + Math.sin(orbit) * optR;
            }
            bot.aimAngle = Math.atan2(ay, ax) + (Math.random() - 0.5) * D.aimNoise;
            bot.wantShoot = Math.random() < D.shootChance;
          } else {
            const margin = 150;
            bot.targetX = margin + Math.random() * (WW - margin*2);
            bot.targetY = margin + Math.random() * (WH - margin*2);
            bot.aimAngle = Math.atan2(bot.targetY - p.y, bot.targetX - p.x);
            bot.wantShoot = false;
          }
          bot.targetX = clamp(bot.targetX, 80, WW-80);
          bot.targetY = clamp(bot.targetY, 80, WH-80);
        }
        const moveAngle = Math.atan2(bot.targetY - p.y, bot.targetX - p.x);
        applyBotInp(bot.id, moveAngle, bot.aimAngle || moveAngle, bot.wantShoot || false, D.speedMult);
      });
    }

    function applyBotInp(pid, moveAngle, aimAngle, shoot, speedMult){
      const p = gs.players[pid];
      if (!p || !p.alive) return;
      const ch = p.chaos > 0 ? -1 : 1;
      const spd = PSPD * speedMult * (1 + (p.speed > 0 ? 0.65 : 0)) * ch;
      p.vx = lerp(p.vx, Math.cos(moveAngle) * spd, 0.15);
      p.vy = lerp(p.vy, Math.sin(moveAngle) * spd, 0.15);
      p.angle = aimAngle;
      if (shoot && p.sCD <= 0) {
        fireBullet(pid, p);
        p.sCD = SHOOT_CD;
      }
    }

    // ── FIRE / STEP FUNCTIONS (same as before) ───────────────────
    // paste your original stepPlayers, fireBullet, stepBullets, spawnPU, stepPowerups, applyPU, addSplat, boom here

    // For example:
    function fireBullet(pid, p){
      const big = p.bigShot > 0;
      gs.bullets = gs.bullets || [];
      gs.bullets.push({
        id: bId++,
        x: p.x + Math.cos(p.angle)*(PRAD+10),
        y: p.y + Math.sin(p.angle)*(PRAD+10),
        vx: Math.cos(p.angle)*(big?500:650),
        vy: Math.sin(p.angle)*(big?500:650),
        pid, big, life: big?2.8:2.2
      });
      if (pid === myId || botMode) playSound(big ? 'bigshot' : 'shoot', big ? 0.7 : 1.3);
    }

    // ... rest of step functions ...

    // ── RENDER / VISUALS (paste your full render/draw* functions here) ──

    // ── INPUT (same as before) ───────────────────────────────────
    // paste canvas/mouse/touch listeners here

    // ── BOOT ─────────────────────────────────────────────────────
    resizeCanvas();
    showScreen('screen-home');
    document.getElementById('name-in').focus();
    setDiff('medium');
    setBotCount(1);
  </script>
