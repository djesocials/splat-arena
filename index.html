<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#04040f;font-family:'Boogaloo',cursive;}

.logo-sub{font-size:clamp(11px,2vw,15px);letter-spacing:8px;color:rgba(255,255,255,.28);text-transform:uppercase;margin-top:2px;text-align:center;}

.code-box{font-size:clamp(38px,10vw,68px);letter-spacing:12px;color:#fff;padding:10px 24px;cursor:pointer;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:16px;text-shadow:0 0 28px rgba(255,60,160,.8),0 0 55px rgba(255,60,160,.3);}

#hud{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;pointer-events:none;}
#hud.hidden{display:none;}

#timer{font-size:clamp(28px,5.5vw,42px);text-shadow:0 0 18px rgba(255,255,255,.28);letter-spacing:2px;}
#timer.warn{color:#FF3CA0;animation:timerPulse .5s ease-in-out infinite alternate;}

#fire-btn{position:absolute;bottom:22px;right:22px;width:74px;height:74px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ff6060,#c01830);border:3px solid rgba(255,255,255,.22);display:none;align-items:center;justify-content:center;font-size:26px;z-index:15;box-shadow:0 0 28px rgba(255,40,80,.45);pointer-events:all;touch-action:manipulation;}

#minimap-c.hidden{display:none;}
.toast{position:absolute;top:18px;left:50%;transform:translateX(-50%);background:rgba(4,4,15,.92);backdrop-filter:blur(10px);padding:7px 18px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:50;white-space:nowrap;border:1px solid rgba(255,255,255,.1);}
.toast.show{opacity:1;}

#go-scores{display:flex;flex-direction:column;gap:5px;align-items:center;}
.go-row{display:flex;align-items:center;gap:10px;font-size:clamp(15px,3vw,19px);}
.go-dot{width:14px;height:14px;border-radius:50%;}
#sound-toggle{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;color:#fff;opacity:.4;transition:all .2s;}
#sound-toggle:hover{opacity:1;background:rgba(255,255,255,.15);}
</style>

<body>

<div id="sound-toggle" onclick="toggleMute()">🔊</div>
<div class="bg-layer">
  <div class="orb" style="width:600px;height:600px;background:#FF3CA0;opacity:.055;top:-200px;left:-150px;animation-duration:12s;"></div>
  <div class="orb" style="width:500px;height:500px;background:#00EEFF;opacity:.055;bottom:-150px;right:-100px;animation-duration:15s;animation-delay:-5s;"></div>

<script type="module">
'use strict';

const { ref, onValue, set, update, runTransaction, serverTimestamp, db } = window.firebaseAPI;

/* ====================== CONSTANTS ====================== */
const WW=2400, WH=1600;
const PRAD=26, BRAD=7, BBRAD=16;
const PSPD=420;
const GDUR=120, SHOOT_CD=290, PU_INTERVAL=6500;
const TRAIL_MAX=28;
const COLORS=['#FF3CA0','#00EEFF','#7BFF35','#FF9D00'];
const PU_TYPES=['speed','big','shield','chaos','heal'];
const PU_CLR ={speed:'#FFEE00',big:'#FF6B00',shield:'#00FFCC',chaos:'#CC00FF',heal:'#FF4466'};
const PU_ICO ={speed:'⚡',big:'💥',shield:'🛡',chaos:'🌀',heal:'❤️'};
const BOT_NAMES=['ROBO','GLITCH','AXIOM','NEXUS','DELTA','OMEGA'];

/* ====================== AUDIO ====================== */
let AC = null;
let AC_MUTE = localStorage.getItem('splatMute') === 'true';
const soundToggle = document.getElementById('sound-toggle');
soundToggle.textContent = AC_MUTE ? '🔇' : '🔊';

function initAudio(){
  if(AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type, pitch=1){
  if(AC_MUTE || !AC) return;
  if(AC.state==='suspended') AC.resume().catch(()=>{});
  const now = AC.currentTime;
  const g = AC.createGain(); g.connect(AC.destination);
  const o = AC.createOscillator(); o.connect(g);

  if(type==='shoot'){
    o.type='triangle'; o.frequency.setValueAtTime(880*pitch,now); o.frequency.exponentialRampToValueAtTime(220,now+0.08);
    g.gain.setValueAtTime(0.18,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
    o.start(now); o.stop(now+0.12);
  } else if(type==='bigshot'){
    o.type='sawtooth'; o.frequency.setValueAtTime(300*pitch,now); o.frequency.exponentialRampToValueAtTime(80,now+0.25);
    g.gain.setValueAtTime(0.22,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
    o.start(now); o.stop(now+0.25);
  } else if(type==='hit'){
    o.type='square'; o.frequency.setValueAtTime(120*pitch,now); o.frequency.linearRampToValueAtTime(40,now+0.18);
    g.gain.setValueAtTime(0.14,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.18);
    o.start(now); o.stop(now+0.18);
  } else if(type==='splat' || type==='death'){
    o.type='sine'; o.frequency.setValueAtTime(180*pitch,now); o.frequency.exponentialRampToValueAtTime(60,now+0.22);
    g.gain.setValueAtTime(0.25,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.22);
    o.start(now); o.stop(now+0.22);
  } else if(type==='powerup'){
    o.type='sine'; o.frequency.setValueAtTime(600,now); o.frequency.exponentialRampToValueAtTime(1200*pitch,now+0.35);
    g.gain.setValueAtTime(0.12,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
    o.start(now); o.stop(now+0.35);
  } else if(type==='respawn'){
    o.type='triangle'; o.frequency.setValueAtTime(400,now); o.frequency.exponentialRampToValueAtTime(900,now+0.15);
    g.gain.setValueAtTime(0.15,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
    o.start(now); o.stop(now+0.15);
  }
}

function toggleMute(){
  AC_MUTE = !AC_MUTE;
  localStorage.setItem('splatMute', AC_MUTE);
  soundToggle.textContent = AC_MUTE ? '🔇' : '🔊';
}

/* ====================== STATE ====================== */
let myId = null, myName = 'PLAYER', roomCode = null, isHost = false, botMode = false;
let gs = null;
let splats = [], parts = [], trails = {};
let bId = 0, pId = 0, puTimer = 0;
let bots = [];
let camX = 0, camY = 0;
let mouseX = 0, mouseY = 0, shootHeld = false, fireTouchDown = false;
const inp = {angle:0, shoot:false};
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const mm = document.getElementById('minimap-c');
const mmc = mm.getContext('2d');
let rafId = null;

/* ====================== UTILS ====================== */
function showScreen(id){
  initAudio();
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('hidden', s.id !== id));
}
function toast(msg,ms=2400){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),ms);
}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.random()*c.length|0]).join('');}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function dst2(a,b){return (a.x-b.x)**2+(a.y-b.y)**2;}
function copyCode(){navigator.clipboard.writeText(roomCode).then(()=>toast('📋 Copied!'));}
function isInView(x,y){return x>camX-100&&x<camX+canvas.width+100&&y>camY-100&&y<camY+canvas.height+100;}

/* ====================== LOBBY ====================== */
function hostGame(){
  myName=(document.getElementById('name-in').value.trim().toUpperCase()||'PLAYER').slice(0,12);
  roomCode=genCode();
  isHost=true; myId=0;

  const roomRef = ref(db, `rooms/${roomCode}`);
  set(roomRef, {
    phase:'lobby',
    hostName:myName,
    createdAt:serverTimestamp(),
    players:{0:mkPlayer(0,myName)}
  }).then(()=>{
    document.getElementById('codeDisplay').textContent=roomCode;
    showScreen('screen-lobby');
    toast('Room created! Share the code 🎉');
    listenToRoom();
  });
}

function gotoJoin(){
  myName=(document.getElementById('name-in').value.trim().toUpperCase()||'PLAYER').slice(0,12);
  showScreen('screen-join');
}

function joinGame(){
  roomCode=document.getElementById('code-in').value.trim().toUpperCase();
  if(roomCode.length<4){toast('Enter a valid code!');return;}

  const roomRef = ref(db, `rooms/${roomCode}`);
  runTransaction(roomRef, (room)=>{
    if(!room || room.phase!=='lobby') return;
    const count = Object.keys(room.players||{}).length;
    if(count>=4) return;
    const newId = count;
    room.players = room.players || {};
    room.players[newId] = mkPlayer(newId, myName);
    myId = newId;
    return room;
  }).then((result)=>{
    if(result.committed){
      toast('Joined!');
      listenToRoom();
      showScreen('screen-lobby');
    } else toast('Room full or game started');
  });
}

function listenToRoom(){
  const roomRef = ref(db, `rooms/${roomCode}`);
  onValue(roomRef, (snap)=>{
    gs = snap.val();
    if(!gs){toast('Room closed');leaveGame();return;}
    if(gs.phase==='lobby') updateLobbyUI();
    if(gs.phase==='playing' && !rafId) launchGame();
    if(gs.phase==='gameover') showGO();
  });
}

function updateLobbyUI(){
  const g=document.getElementById('pGrid'); g.innerHTML='';
  for(let i=0;i<4;i++){
    const p=gs?.players?.[i];
    const el=document.createElement('div');
    el.className='pslot'+(p?' on':'');
    if(p){
      el.style.cssText=`background:${COLORS[i]}15;border-color:${COLORS[i]};color:${COLORS[i]};box-shadow:0 0 12px ${COLORS[i]}44;`;
      el.innerHTML=`<div style="font-size:22px">●</div><div style="font-size:10px;font-weight:700">${p.name}</div>`;
    } else el.innerHTML=`<div style="font-size:22px;opacity:.18">○</div><div>Empty</div>`;
    g.appendChild(el);
  }
  const n=Object.keys(gs?.players||{}).length;
  document.getElementById('lobby-msg').textContent=isHost?(n>1?`${n} players ready!`:'Waiting for friends…'):`${n} player${n!==1?'s':''} in lobby`;
  document.getElementById('startBtn').style.display=isHost&&n>=1?'block':'none';
}

/* ====================== GAME STATE ====================== */
function mkPlayer(id,name){
  const sp=[{x:280,y:280},{x:WW-280,y:WH-280},{x:WW-280,y:280},{x:280,y:WH-280}];
  return {id,name,x:sp[id].x,y:sp[id].y,vx:0,vy:0,angle:0,score:0,alive:true,rTimer:0,sCD:0,shield:0,speed:0,bigShot:0,chaos:0};
}

/* ====================== BOT MODE ====================== */
let botCount=1, botDiff='medium';
function goBotMode(){
  myName=(document.getElementById('name-in').value.trim().toUpperCase()||'PLAYER').slice(0,12);
  showScreen('screen-bots');
}
function setBotCount(n){botCount=n;document.querySelectorAll('#bot-count-row .diff-btn').forEach((b,i)=>b.classList.toggle('sel',i===n-1));}
function setDiff(d){botDiff=d;document.querySelectorAll('#diff-row .diff-btn').forEach(b=>b.classList.toggle('sel',b.textContent.toLowerCase().includes(d)));}
function startBotGame(){
  isHost=true; botMode=true; myId=0; roomCode='BOT-'+Math.random().toString(36).slice(2,8).toUpperCase();
  gs={phase:'playing',timeLeft:GDUR,players:{0:mkPlayer(0,myName)},bullets:[],powerups:[]};
  bots=[];
  for(let i=0;i<botCount;i++){
    const id=i+1;
    gs.players[id]=mkPlayer(id,BOT_NAMES[i%BOT_NAMES.length]);
    bots.push({id,thinkTimer:Math.random()*0.5,targetX:gs.players[id].x,targetY:gs.players[id].y,aimAngle:Math.random()*Math.PI*2,wantShoot:false});
  }
  splats=[];parts=[];trails={};bId=0;pId=0;puTimer=0;
  launchGame();
}

/* ====================== START GAME ====================== */
function startGame(){
  if(!isHost) return;
  const roomRef = ref(db, `rooms/${roomCode}`);
  update(roomRef, {phase:'playing', timeLeft:GDUR});
}

/* ====================== LAUNCH & LOOP ====================== */
function launchGame(){
  showScreen('_none');
  canvas.classList.remove('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('minimap-c').classList.remove('hidden');
  if(isMobile) document.getElementById('fire-btn').style.display='flex';
  resizeCanvas();

  let lastF = performance.now();
  function loop(now){
    rafId = requestAnimationFrame(loop);
    const dt = Math.min((now-lastF)/1000, 0.05);
    lastF = now;

    if(isHost) hostTick(dt);

    updateCamera(dt);
    updateParts(dt);
    updateTrails();
    render();
    updateHUD();
    renderMinimap();
  }
  loop(performance.now());
}

function hostTick(dt){
  applyInput(0, inp);
  if(botMode) tickBots(dt);
  stepPlayers(dt);
  stepBullets(dt);
  stepPowerups(dt);

  gs.timeLeft -= dt;
  puTimer += dt*1000;
  if(puTimer > PU_INTERVAL){puTimer=0;spawnPU();}
  if(gs.timeLeft <= 0){
    gs.phase = 'gameover';
    endGame();
  }

  const roomRef = ref(db, `rooms/${roomCode}`);
  update(roomRef, {
    players: gs.players,
    bullets: gs.bullets,
    powerups: gs.powerups,
    timeLeft: gs.timeLeft,
    phase: gs.phase,
    winner: gs.winner
  });
}

/* ====================== PLAYER INPUT ====================== */
function applyInput(pid, input){
  const p = gs?.players?.[pid];
  if(!p || !p.alive) return;
  const ch = p.chaos > 0 ? -1 : 1;
  const spd = PSPD * (1 + (p.speed>0?0.65:0)) * ch;
  p.vx = lerp(p.vx, Math.cos(input.angle)*spd, 0.15);
  p.vy = lerp(p.vy, Math.sin(input.angle)*spd, 0.15);
  p.angle = input.angle;
  if(input.shoot && p.sCD <= 0){
    fireBullet(pid, p);
    p.sCD = SHOOT_CD;
  }
}

/* ====================== BOT AI (fixed) ====================== */
const DIFF = {easy:{speedMult:0.28,thinkSec:2.2,shootRange:220,aimNoise:1.4,shootChance:0.2},medium:{speedMult:0.52,thinkSec:0.9,shootRange:420,aimNoise:0.5,shootChance:0.6},hard:{speedMult:0.80,thinkSec:0.3,shootRange:700,aimNoise:0.12,shootChance:0.88}};

function tickBots(dt){
  const D = DIFF[botDiff]||DIFF.medium;
  bots.forEach(bot=>{
    const p = gs.players[bot.id];
    if(!p||!p.alive) return;
    bot.thinkTimer = (bot.thinkTimer||0)-dt;
    if(bot.thinkTimer<=0){
      bot.thinkTimer = D.thinkSec*(0.75+Math.random()*0.5);
      let target=null, bestD=Infinity;
      Object.values(gs.players).forEach(en=>{
        if(!en||!en.alive||en.id===bot.id) return;
        const d=dst2(p,en); if(d<bestD){bestD=d;target=en;}
      });
      const inRange = target && bestD < D.shootRange**2;
      if(inRange){
        const ax=target.x-p.x, ay=target.y-p.y;
        const toA=Math.atan2(ay,ax);
        const dist=Math.sqrt(bestD);
        if(dist<180){
          bot.targetX = p.x - ax*0.8;
          bot.targetY = p.y - ay*0.8;
        } else {
          const side = (bot.id%2===0?1:-1)*(Math.random()<0.1?-1:1);
          const orbit = toA + Math.PI/2 * side;
          const optR = 240;
          bot.targetX = target.x + Math.cos(orbit)*optR;
          bot.targetY = target.y + Math.sin(orbit)*optR;
        }
        bot.aimAngle = Math.atan2(ay,ax) + (Math.random()-0.5)*D.aimNoise;
        bot.wantShoot = Math.random() < D.shootChance;
      } else {
        const margin=150;
        bot.targetX = margin + Math.random()*(WW-margin*2);
        bot.targetY = margin + Math.random()*(WH-margin*2);
        bot.aimAngle = Math.atan2(bot.targetY-p.y, bot.targetX-p.x);
        bot.wantShoot = false;
      }
      bot.targetX = clamp(bot.targetX,80,WW-80);
      bot.targetY = clamp(bot.targetY,80,WH-80);
    }
    const moveAngle = Math.atan2(bot.targetY-p.y, bot.targetX-p.x);
    applyBotInp(bot.id, moveAngle, bot.aimAngle||moveAngle, bot.wantShoot||false, D.speedMult);
  });
}

function applyBotInp(pid,moveAngle,aimAngle,shoot,speedMult){
  const p = gs.players[pid];
  if(!p||!p.alive) return;
  const ch = p.chaos>0?-1:1;
  const spd = PSPD*speedMult*(1+(p.speed>0?0.65:0))*ch;
  p.vx = lerp(p.vx,Math.cos(moveAngle)*spd,0.15);
  p.vy = lerp(p.vy,Math.sin(moveAngle)*spd,0.15);
  p.angle = aimAngle;
  if(shoot&&p.sCD<=0){fireBullet(pid,p);p.sCD=SHOOT_CD;}
}

/* ====================== STEP FUNCTIONS ====================== */
function stepPlayers(dt){
  Object.keys(gs.players||{}).forEach(key=>{
    const p = gs.players[key];
    if(!p) return;
    if(!p.alive){
      p.rTimer -= dt;
      if(p.rTimer <= 0){
        const sp = [{x:280,y:280},{x:WW-280,y:WH-280},{x:WW-280,y:280},{x:280,y:WH-280}];
        p.x = sp[p.id].x + (Math.random()-0.5)*140;
        p.y = sp[p.id].y + (Math.random()-0.5)*140;
        p.vx = p.vy = 0;
        p.alive = true;
        p.shield = 2200;
        if(isInView(p.x,p.y) || p.id===myId) playSound('respawn');
      }
      return;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if(p.x<PRAD){p.x=PRAD;p.vx*=-0.3;}
    if(p.x>WW-PRAD){p.x=WW-PRAD;p.vx*=-0.3;}
    if(p.y<PRAD){p.y=PRAD;p.vy*=-0.3;}
    if(p.y>WH-PRAD){p.y=WH-PRAD;p.vy*=-0.3;}
    const ms = dt*1000;
    if(p.sCD>0) p.sCD-=ms;
    if(p.shield>0) p.shield-=ms;
    if(p.speed>0) p.speed-=ms;
    if(p.bigShot>0) p.bigShot-=ms;
    if(p.chaos>0) p.chaos-=ms;
  });
}

function fireBullet(pid,p){
  const big = p.bigShot>0;
  gs.bullets = gs.bullets || [];
  gs.bullets.push({
    id:bId++,
    x:p.x+Math.cos(p.angle)*(PRAD+10),
    y:p.y+Math.sin(p.angle)*(PRAD+10),
    vx:Math.cos(p.angle)*(big?500:650),
    vy:Math.sin(p.angle)*(big?500:650),
    pid,big,life:big?2.8:2.2
  });
  if(pid===myId || botMode) playSound(big?'bigshot':'shoot', big?0.7:1.3);
}

function stepBullets(dt){
  gs.bullets = (gs.bullets||[]).filter(b=>{
    b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
    const r = b.big?BBRAD:BRAD;
    if(b.life<=0 || b.x<r || b.x>WW-r || b.y<r || b.y>WH-r){
      addSplat(b.x,b.y,COLORS[b.pid],b.big);
      boom(b.x,b.y,COLORS[b.pid],b.big?14:7);
      if(isInView(b.x,b.y)) playSound('splat', b.big?0.7:1);
      return false;
    }
    Object.keys(gs.players||{}).forEach(key=>{
      const p = gs.players[key];
      if(!p||!p.alive||p.id===b.pid) return;
      if(dst2(b,p) < (PRAD+r)**2){
        addSplat(p.x,p.y,COLORS[b.pid],b.big);
        boom(p.x,p.y,COLORS[b.pid],b.big?24:12);
        if(p.shield<=0){
          p.alive=false; p.rTimer=3; p.vx=p.vy=0;
          const s = gs.players[b.pid];
          if(s) s.score++;
          if(isInView(p.x,p.y)) playSound('death');
        } else {
          p.shield=0;
          boom(p.x,p.y,'#00FFCC',8);
        }
        if(isInView(p.x,p.y)) playSound('hit', b.big?0.5:1.2);
        return;
      }
    });
    return true;
  });
}

function spawnPU(){
  gs.powerups = gs.powerups || [];
  gs.powerups.push({id:pId++,x:120+Math.random()*(WW-240),y:120+Math.random()*(WH-240),type:PU_TYPES[Math.random()*PU_TYPES.length|0],life:15});
}

function stepPowerups(dt){
  gs.powerups = (gs.powerups||[]).filter(u=>{
    u.life -= dt;
    if(u.life<=0) return false;
    Object.keys(gs.players||{}).forEach(key=>{
      const p = gs.players[key];
      if(!p||!p.alive) return;
      if(dst2(p,u) < (PRAD+22)**2){
        applyPU(p,u.type);
        boom(u.x,u.y,PU_CLR[u.type],18);
        if(p.id===myId || botMode) playSound('powerup');
        return false;
      }
    });
    return true;
  });
}

function applyPU(p,t){
  if(t==='speed') p.speed=5000;
  else if(t==='big') p.bigShot=6000;
  else if(t==='shield') p.shield=9000;
  else if(t==='chaos') Object.keys(gs.players||{}).forEach(k=>{if(gs.players[k]&&gs.players[k].id!==p.id) gs.players[k].chaos=3500;});
  else if(t==='heal') p.shield=5000;
}

function addSplat(x,y,color,big=false){
  splats.push({x,y,color,r:big?42:22,a:Math.random()*6.28,pts:6+Math.random()*5|0});
  if(splats.length>320) splats.shift();
}

function boom(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28, spd=70+Math.random()*300;
    parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,color,life:0.5+Math.random()*0.5,max:0.7+Math.random()*0.4,r:3+Math.random()*7});
  }
}

/* ====================== GAME OVER ====================== */
function endGame(){
  if(!isHost) return;
  const alive = Object.values(gs.players||{}).filter(p=>p?.alive);
  const win = alive.reduce((b,p)=>(!b||p.score>b.score)?p:b,null);
  gs.winner = win ? win.id : null;
  gs.phase = 'gameover';
  update(ref(db, `rooms/${roomCode}`), {phase:'gameover', winner:gs.winner});
}

function showGO(){
  canvas.classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('minimap-c').classList.add('hidden');
  document.getElementById('fire-btn').style.display='none';
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}

  const win = gs.winner!=null ? gs.players[gs.winner] : null;
  const el = document.getElementById('go-winner');
  el.textContent = win ? `🎉 ${win.name} WINS!` : '🎨 TIE!';
  el.style.cssText = `color:${win?COLORS[win.id]:'#fff'};text-shadow:0 0 36px ${win?COLORS[win.id]:'#fff'};`;

  let html = `<div style="font-size:clamp(22px,5.5vw,38px);margin:20px 0 16px;opacity:0.9;">FINAL SCORES</div>`;
  html += Object.values(gs.players||{}).sort((a,b)=>b.score-a.score).map(p=>`
    <div class="go-row" style="font-size:clamp(18px,4.5vw,30px);margin:8px 0;">
      <div class="go-dot" style="background:${COLORS[p.id]};width:18px;height:18px;box-shadow:0 0 10px ${COLORS[p.id]}99;"></div>
      <span style="min-width:150px;color:${COLORS[p.id]};font-weight:bold;">${p.name}</span>
      <span style="color:#fff;font-family:'Nunito',sans-serif;font-weight:800;">${p.score} ${p.score===1?'splat':'splats'}</span>
      ${p.id===gs.winner?' 👑':''}
    </div>
  `).join('');
  document.getElementById('go-scores').innerHTML = html;
  document.getElementById('screen-go').classList.remove('hidden');
}

function playAgain(){
  if(botMode){startBotGame();}
  else if(isHost){update(ref(db, `rooms/${roomCode}`), {phase:'lobby'});}
  else{toast('Waiting for host…',2500);}
}

function leaveGame(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(roomCode){
    const playerRef = ref(db, `rooms/${roomCode}/players/${myId}`);
    remove(playerRef);
  }
  splats=[];parts=[];trails={};bots=[];gs=null;roomCode=null;isHost=false;botMode=false;myId=null;
  canvas.classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('minimap-c').classList.add('hidden');
  document.getElementById('fire-btn').style.display='none';
  showScreen('screen-home');
}

/* ====================== VISUALS ====================== */
function updateCamera(dt){
  const me = gs?.players?.[myId];
  if(!me) return;
  const leadX = Math.cos(inp.angle)*80;
  const leadY = Math.sin(inp.angle)*80;
  const targetX = me.x + leadX - canvas.width/2;
  const targetY = me.y + leadY - canvas.height/2;
  const t = 1 - Math.pow(0.001, dt);
  camX = lerp(camX, targetX, t);
  camY = lerp(camY, targetY, t);
  camX = clamp(camX,0,Math.max(0,WW-canvas.width));
  camY = clamp(camY,0,Math.max(0,WH-canvas.height));
}

function updateParts(dt){
  parts = parts.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=280*dt;p.vx*=.97;p.life-=dt;return p.life>0;});
}

function updateTrails(){
  if(!gs) return;
  Object.keys(gs.players||{}).forEach(key=>{
    const p = gs.players[key];
    if(!p||!p.alive) return;
    if(!trails[p.id]) trails[p.id]=[];
    trails[p.id].push({x:p.x,y:p.y});
    if(trails[p.id].length>TRAIL_MAX) trails[p.id].shift();
  });
}

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  mm.width = 110; mm.height = 74;
}
window.addEventListener('resize',resizeCanvas);

function render(){
  if(!gs) return;
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(Math.round(-camX), Math.round(-camY));
  drawFloor(); drawSplats(); drawPUs(); drawTrails(); drawBullets(); drawPlayers(); drawParticles(); drawBorder();
  ctx.restore();
  drawVignette(W,H);
  const me=gs.players[myId];
  if(me&&!me.alive){
    ctx.fillStyle='rgba(0,0,0,.48)'; ctx.fillRect(0,0,W,H);
    ctx.font=`bold ${Math.min(W*.044,20)|0}px Boogaloo`;
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.textAlign='center';
    ctx.fillText(`💀 SPLATTED! Respawning in ${Math.ceil(me.rTimer)}s…`,W/2,H/2);
  }
}

function drawFloor(){
  const bg=ctx.createLinearGradient(0,0,WW,WH);
  bg.addColorStop(0,'#07071a'); bg.addColorStop(.5,'#0b0b22'); bg.addColorStop(1,'#060614');
  ctx.fillStyle=bg; ctx.fillRect(0,0,WW,WH);
  const S=68, w=S*Math.sqrt(3);
  ctx.strokeStyle='rgba(120,120,255,.038)'; ctx.lineWidth=1;
  for(let r=-1;r<WH/S*2/3+3;r++){
    for(let c=-1;c<WW/w+3;c++){
      const cx=(c+(r%2)*.5)*w, cy=r*(S*1.5);
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;ctx.lineTo(cx+S*Math.cos(a),cy+S*Math.sin(a));}
      ctx.closePath(); ctx.stroke();
    }
  }
}

function drawBorder(){
  ctx.save();
  ctx.strokeStyle='rgba(255,60,160,.55)'; ctx.lineWidth=5; ctx.shadowColor='#FF3CA0'; ctx.shadowBlur=20;
  ctx.strokeRect(3,3,WW-6,WH-6);
  ctx.restore();
}

function drawSplats(){
  splats.forEach(sp=>{
    ctx.save(); ctx.translate(sp.x,sp.y); ctx.rotate(sp.a);
    ctx.globalAlpha=.48; ctx.fillStyle=sp.color;
    ctx.beginPath();
    for(let i=0;i<sp.pts*2;i++){
      const a=(i/(sp.pts*2))*Math.PI*2, r=i%2===0?sp.r:sp.r*0.45;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

function drawTrails(){
  Object.entries(trails).forEach(([id,trail])=>{
    if(!trail||trail.length<2) return;
    const col=COLORS[+id];
    for(let i=1;i<trail.length;i++){
      const t=i/trail.length;
      ctx.save(); ctx.globalAlpha=t*.28; ctx.strokeStyle=col;
      ctx.lineWidth=t*PRAD*.6; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(trail[i-1].x,trail[i-1].y); ctx.lineTo(trail[i].x,trail[i].y);
      ctx.stroke(); ctx.restore();
    }
  });
}

function drawPlayers(){
  const now=Date.now();
  Object.keys(gs.players||{}).forEach(key=>{
    const p = gs.players[key];
    if(!p||!p.alive) return;
    const col=COLORS[p.id];
    const blink = p.shield>0 && Math.floor(now/120)%2===0;
    ctx.globalAlpha = blink ? 0.38 : 1;
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.shadowColor=col; ctx.shadowBlur=20;
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(0,0,PRAD,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(8,-7,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8,7,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='black'; ctx.beginPath(); ctx.arc(10,-7,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(10,7,2,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.font='bold 13px Boogaloo'; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,.65)'; ctx.lineWidth=3;
    ctx.strokeText(p.name,p.x,p.y-PRAD-10);
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fillText(p.name,p.x,p.y-PRAD-10);
    ctx.globalAlpha=1;
  });
}

function drawBullets(){
  (gs.bullets||[]).forEach(b=>{
    const col=COLORS[b.pid], r=b.big?BBRAD:BRAD;
    ctx.shadowColor=col; ctx.shadowBlur=15;
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(b.x,b.y,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  });
}

function drawPUs(){
  const now=Date.now();
  (gs.powerups||[]).forEach(u=>{
    const col=PU_CLR[u.type], pulse=1+Math.sin(now*.004+u.id)*.13;
    ctx.save(); ctx.translate(u.x,u.y);
    ctx.shadowColor=col; ctx.shadowBlur=20;
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(0,0,22*pulse,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='white'; ctx.font='20px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(PU_ICO[u.type],0,0);
    ctx.restore();
  });
}

function drawParticles(){
  parts.forEach(p=>{
    const a=p.life/p.max;
    ctx.globalAlpha=a*.85; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawVignette(W,H){
  const vg=ctx.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,H*.88);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,.58)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

function updateHUD(){
  if(!gs||gs.phase!=='playing') return;
  const t=Math.ceil(gs.timeLeft), m=t/60|0, s2=t%60;
  const te=document.getElementById('timer');
  te.textContent=`${m}:${(''+s2).padStart(2,'0')}`; te.className=t<=15?'warn':'';
  document.getElementById('hud-scores').innerHTML=
    Object.values(gs.players||{}).sort((a,b)=>b.score-a.score).map(p=>`
      <div class="hs" style="border-left-color:${COLORS[p.id]}">
        <span style="color:${COLORS[p.id]};font-weight:700">${p.name}</span>
        <span style="font-family:'Nunito',sans-serif;font-weight:700">${p.score}</span>
      </div>`).join('');
}

function renderMinimap(){
  if(!gs||gs.phase!=='playing') return;
  const W=mm.width, H=mm.height, sx=W/WW, sy=H/WH;
  mmc.clearRect(0,0,W,H);
  mmc.fillStyle='rgba(4,4,20,.9)'; mmc.fillRect(0,0,W,H);
  splats.forEach(sp=>{mmc.fillStyle=sp.color;mmc.globalAlpha=.32;mmc.beginPath();mmc.arc(sp.x*sx,sp.y*sy,1.4,0,Math.PI*2);mmc.fill();});
  mmc.globalAlpha=1;
  Object.keys(gs.players||{}).forEach(key=>{
    const p=gs.players[key];
    if(!p||!p.alive) return;
    mmc.shadowColor=COLORS[p.id]; mmc.shadowBlur=5; mmc.fillStyle=COLORS[p.id];
    mmc.beginPath(); mmc.arc(p.x*sx,p.y*sy,p.id===myId?4:3,0,Math.PI*2); mmc.fill();
    mmc.shadowBlur=0;
  });
  mmc.strokeStyle='rgba(255,255,255,.22)'; mmc.lineWidth=1;
  mmc.strokeRect(camX*sx,camY*sy,canvas.width*sx,canvas.height*sy);
}
